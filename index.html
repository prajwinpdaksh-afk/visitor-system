<!DOCTYPE html>
<html>
<head>
  <title>Visitor Control</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: black;
      color: white;
      text-align: center;
    }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      border: none;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      background: blue;
      color: white;
      cursor: pointer;
    }

    table {
      margin: auto;
      margin-top: 20px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border: 1px solid white;
    }
  </style>
</head>

<body>

<h1>Visitor Management</h1>

<input id="name" placeholder="Name"><br>
<input id="phone" placeholder="Phone"><br>
<input id="purpose" placeholder="Purpose"><br>
<input id="flat" placeholder="Flat No"><br>

<button onclick="addVisitor()">Check In</button>

<table>
  <tr>
    <th>Name</th>
    <th>Flat</th>
    <th>Entry</th>
    <th>Exit</th>
    <th>Action</th>
  </tr>
  <tbody id="tableBody"></tbody>
</table>

<script type="module">

import { initializeApp } from "firebase/app";

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyBZpR6uikU_8IYSyqz6WKWUTjy3cDdlJ4E",
  authDomain: "visitor-system-78c4d.firebaseapp.com",
  projectId: "visitor-system-78c4d",
  storageBucket: "visitor-system-78c4d.firebasestorage.app",
  messagingSenderId: "582473230963",
  appId: "1:582473230963:web:b9972cbb68bed34da0d806"
};

// Initialize Firebase

  

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const tableBody = document.getElementById("tableBody");

function getTime() {
  return new Date().toLocaleTimeString();
}

window.addVisitor = async function () {
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const purpose = document.getElementById("purpose").value;
  const flat = document.getElementById("flat").value;

  await addDoc(collection(db, "visitors"), {
    name,
    phone,
    purpose,
    flat,
    entry: getTime(),
    exit: null
  });

  loadVisitors();
};

window.exitVisitor = async function (id) {
  const ref = doc(db, "visitors", id);
  await updateDoc(ref, {
    exit: getTime()
  });

  loadVisitors();
};

async function loadVisitors() {
  tableBody.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "visitors"));
  querySnapshot.forEach((docSnap) => {
    const v = docSnap.data();

    tableBody.innerHTML += `
      <tr>
        <td>${v.name}</td>
        <td>${v.flat}</td>
        <td>${v.entry}</td>
        <td>${v.exit || "Inside"}</td>
        <td>
          ${!v.exit ? `<button onclick="exitVisitor('${docSnap.id}')">Exit</button>` : ""}
        </td>
      </tr>
    `;
  });
}

loadVisitors();
</script>

</body>
</html>
