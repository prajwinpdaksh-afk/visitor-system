<!DOCTYPE html>
<html>
<head>
  <title>Visitor Control</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: black;
      color: white;
      text-align: center;
    }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      border: none;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      background: blue;
      color: white;
      cursor: pointer;
    }

    table {
      margin: auto;
      margin-top: 20px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border: 1px solid white;
    }
  </style>
</head>

<body>

<h1>Visitor Management</h1>

<input id="name" placeholder="Name"><br>
<input id="phone" placeholder="Phone"><br>
<input id="purpose" placeholder="Purpose"><br>
<input id="flat" placeholder="Flat No"><br>

<button onclick="addVisitor()">Check In</button>

<table>
  <tr>
    <th>Name</th>
    <th>Flat</th>
    <th>Entry</th>
    <th>Exit</th>
    <th>Action</th>
  </tr>
  <tbody id="tableBody"></tbody>
</table>

<script>
let visitors = JSON.parse(localStorage.getItem("visitors")) || [];

function saveData() {
  localStorage.setItem("visitors", JSON.stringify(visitors));
}

function getTime() {
  return new Date().toLocaleTimeString();
}

function addVisitor() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let purpose = document.getElementById("purpose").value;
  let flat = document.getElementById("flat").value;

  visitors.push({
    name,
    phone,
    purpose,
    flat,
    entry: getTime(),
    exit: null
  });

  saveData();
  display();
}

function exitVisitor(index) {
  visitors[index].exit = getTime();
  saveData();
  display();
}

function display() {
  let body = document.getElementById("tableBody");
  body.innerHTML = "";

  visitors.forEach((v, i) => {
    body.innerHTML += `
      <tr>
        <td>${v.name}</td>
        <td>${v.flat}</td>
        <td>${v.entry}</td>
        <td>${v.exit || "Inside"}</td>
        <td>
          ${!v.exit ? `<button onclick="exitVisitor(${i})">Exit</button>` : ""}
        </td>
      </tr>
    `;
  });
}

display();
</script>

</body>
</html>
